<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome — Project</title>
    <link rel="stylesheet" href="./welcome-frame.css" />
  </head>
  <body>
    <main class="welcome-root">
      <header class="welcome-header">
        <div class="logo shectory-logo">SHECTORY</div>
        <div class="project-meta">
          <div class="logo project-logo">PROJECT</div>
          <div class="versions">app 0.0.0 | agent 0.0.0 | module 0.0.0</div>
        </div>
      </header>

      <section class="welcome-content">
        <article class="info-frame">
          <h1>Открытая информация проекта</h1>
          <p>
            Заглушка большого информационного фрейма. Проект заполняет этот блок
            своим HTML/CSS и визуализацией.
          </p>
        </article>

        <aside class="login-frame">
          <h2>Вход</h2>
          <form>
            <label>
              Email
              <input type="email" placeholder="you@domain.tld" />
            </label>
            <label>
              Пароль
              <input type="password" placeholder="••••••••" />
            </label>
            <button type="submit">Войти</button>
          </form>
          <p class="help">Единая область логина Shectory (заглушка).</p>
        </aside>
      </section>
    </main>
  </body>
</html>
