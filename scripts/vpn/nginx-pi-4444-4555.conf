# Nginx: upstream к Pi (Syslog :4444, PingMaster :4555) для proxy_pass из vhost'ов поддоменов.
# Deploy to: /etc/nginx/conf.d/pi-services.conf
# Replaces: /etc/nginx/conf.d/syslog-pi-4444.conf
#
# Канонический вход для пользователей: https://syslog.shectory.ru и https://pingmaster.shectory.ru
# (отдельные server_name + TLS). Блоки listen 4444/4555 с server_name shectory.ru ниже — опционально
# (наследие); в документации и карточках портала не использовать shectory.ru:4444/:4555 как «главный URL».
#
# Upstream priority:
#   1. WireGuard VPN:    10.66.0.2:<port>   (preferred, low latency)
#   2. autossh fallback: 127.0.0.1:2<port>  (TCP/443 reverse tunnel)
#
# To switch between upstreams, comment/uncomment the server lines in each
# upstream block. The "backup" keyword makes nginx use it only when primary
# servers are down (requires nginx Plus for health checks; for OSS nginx
# we use a simple primary/backup approach).

upstream pi_syslog {
    server 10.66.0.2:4444;               # WireGuard (primary)
    server 127.0.0.1:24444 backup;       # autossh fallback
}

upstream pi_pingmaster {
    server 10.66.0.2:4555;               # WireGuard (primary)
    server 127.0.0.1:24555 backup;       # autossh fallback
}

server {
    listen 4444;
    server_name shectory.ru;

    location / {
        proxy_pass http://pi_syslog;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 4555;
    server_name shectory.ru;

    location / {
        proxy_pass http://pi_pingmaster;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
