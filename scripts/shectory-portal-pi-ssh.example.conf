# Скопируйте в ~/.config/systemd/user/shectory-portal.service.d/pi-ssh.conf и поправьте путь к ключу.
# mkdir -p ~/.config/systemd/user/shectory-portal.service.d
# cp scripts/shectory-portal-pi-ssh.example.conf ~/.config/systemd/user/shectory-portal.service.d/pi-ssh.conf
# nano ~/.config/systemd/user/shectory-portal.service.d/pi-ssh.conf
# chmod 600 ~/.config/systemd/user/shectory-portal.service.d/pi-ssh.conf
# systemctl --user daemon-reload && systemctl --user restart shectory-portal.service
#
# Альтернатива: задать PI_MONITOR_IDENTITY_FILE в shectory-portal/.env или project-envs/cursor-rpa.env.
# Альтернатива 2: Environment=SSH_AUTH_SOCK=... (если ssh-agent доступен в графической сессии).

[Service]
Environment=PI_MONITOR_IDENTITY_FILE=%h/.ssh/id_ed25519
