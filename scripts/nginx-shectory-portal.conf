# Shectory Portal — reverse proxy snippet for Next.js (`next start` on 127.0.0.1:3000).
#
# Symptom: UI loads but has no Tailwind (white page, default links); DevTools shows
# HTTP 400 for `/_next/static/css/*.css` while `/_next/static/chunks/*.js` is 200.
# Cause: nginx splits `/_next/static/` (broken alias/try_files/CDN) so some files
# reach Next with a bad path; static `send` then returns 400.
#
# Fix: one `location /` that proxies the full URI to Node — do not alias only
# part of `/_next/static/` (e.g. css vs chunks).
#
# Paste into your `server { ... }` (adjust upstream port if needed).
# Add Upgrade/Connection + `map` only if you need WebSockets through this proxy.

location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:3000;
}
